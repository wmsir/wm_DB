spring:
  application:
    name: wmdb-backend
  redis:
    host: localhost
    port: 6379
    password:
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: ${WMDB_DB_URL:jdbc:mysql://localhost:3306/wmdb?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC}
          username: ${WMDB_DB_USERNAME:root}
          password: ${WMDB_DB_PASSWORD:}
          driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

wmdb:
  jwt:
    secret: ${WMDB_JWT_SECRET:A_VERY_LONG_SECRET_KEY_FOR_WMDB_V2_COMMERCIAL_EDITION_2024_06_24_DEFAULT_FALLBACK!}
    expiration: 86400000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:wmdb-attachments}
  rsa:
    private-key: ${WMDB_RSA_PRIVATE_KEY:}
