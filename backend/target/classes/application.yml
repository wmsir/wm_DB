spring:
  application:
    name: wmdb-backend
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          url: jdbc:mysql://localhost:3306/wmdb?useUnicode=true&characterEncoding=utf-8&serverTimezone=UTC
          username: root
          password: password
          driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

wmdb:
  jwt:
    secret: ${WMDB_JWT_SECRET:A_VERY_LONG_SECRET_KEY_FOR_WMDB_V2_COMMERCIAL_EDITION_2024_06_24_AND_MOVED_TO_YML!}
    expiration: 86400000
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:wmdb-attachments}
